<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lotto Number Recommender</title>
  <link href='/style.css' rel='stylesheet'>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="background-texture"></div>
  <main class="app-container">
    <div class="theme-toggle-container">
      <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle dark mode">
        <span class="sun-icon">☀️</span>
        <span class="moon-icon">🌙</span>
      </button>
    </div>

    <header class="hero">
      <h1 class="hero-title">Lotto Number Recommender</h1>
      <p class="hero-subtitle">Get your lucky numbers with a single click!</p>
    </header>
    
    <section class="card-section">
      <div class="lotto-card">
        <div id="balls-container" class="balls-container">
          <!-- Lotto balls will appear here -->
          <div class="placeholder-text">Press the button to generate!</div>
        </div>
        
        <button id="generate-btn" class="generate-btn">
          Generate Numbers
          <div class="btn-glow"></div>
        </button>
      </div>
    </section>

    <section class="contact-section">
      <div class="contact-card">
        <h2 class="section-title">Partnership Inquiry</h2>
        <form action="https://formspree.io/f/meelvjwr" method="POST" class="contact-form">
          <div class="input-group">
            <label for="email">Your Email</label>
            <input type="email" name="email" id="email" placeholder="example@email.com" required>
          </div>
          <div class="input-group">
            <label for="message">Message</label>
            <textarea name="message" id="message" rows="4" placeholder="How can we collaborate?" required></textarea>
          </div>
          <button type="submit" class="submit-btn">Send Inquiry</button>
        </form>
      </div>
    </section>

    <section class="comments-section">
      <div class="contact-card">
        <h2 class="section-title">Comments</h2>
        <div id="disqus_thread"></div>
        <script>
            (function() { // DON'T EDIT BELOW THIS LINE
            var d = document, s = d.createElement('script');
            s.src = 'https://gunpany-1.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
      </div>
    </section>
  </main>
  
  <script type="module" src="/main.js"></script>
</body>
</html>
